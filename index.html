<!DOCTYPE html>
<html lang="en">
<head>
    <nav class="navbar">
        <div class="logo">
            <h2>SkillCraft Technology Internship</h2>
        </div>
    </nav>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Web App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">

    <h1>To-Do List</h1>

    <div class="input-box">

        <input
        type="text"
        id="taskInput"
        placeholder="Enter your task">

        <input
        type="datetime-local"
        id="taskDate">

        <button id="addBtn">
            Add Task
        </button>

    </div>

    <ul id="taskList">

    </ul>

</div>

<script src="script.js"></script>

</body>
</html>
